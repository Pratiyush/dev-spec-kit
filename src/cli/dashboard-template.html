<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>rivet — dashboard</title>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('rivet-theme')||'light');}catch(e){}</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"></link>
<style>
:root{
  /* ---- light (default) ---- */
  --bg:#f4f1e9;
  --panel:#ffffff;
  --panel-2:#f7f4ec;
  --panel-3:#eee9dd;
  --border:#e5e0d3;
  --border-2:#d6d0bf;
  --text:#201c15;
  --dim:#6c675b;
  --faint:#9b9485;
  --accent:#bd6a2c;
  --accent-soft:rgba(189,106,44,.10);
  --green:#13935a;  --green-soft:rgba(19,147,90,.11);
  --red:#d4453a;    --red-soft:rgba(212,69,58,.10);
  --purple:#7a5bf0; --purple-soft:rgba(122,91,240,.10);
  --gray:#a39b8a;   --gray-soft:rgba(163,155,138,.13);
  --glow:.22;
  --shadow:0 1px 2px rgba(60,45,15,.05), 0 5px 16px rgba(60,45,15,.045);
  --shadow-lg:0 2px 6px rgba(60,45,15,.06), 0 14px 38px rgba(60,45,15,.07);
  --header-bg:rgba(244,241,233,.86);
  --halo:radial-gradient(1150px 540px at 50% -240px, rgba(189,106,44,.08), transparent 64%);
  --stripe:rgba(40,30,10,.045);
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Space Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;
  --r:12px;
}
[data-theme="dark"]{
  --bg:#0c0b09;
  --panel:#14120e;
  --panel-2:#1a1712;
  --panel-3:#211d15;
  --border:#262219;
  --border-2:#37301f;
  --text:#ece7dc;
  --dim:#9a9180;
  --faint:#6b6457;
  --accent:#e09a52;
  --accent-soft:rgba(224,154,82,.12);
  --green:#3fd68f;  --green-soft:rgba(63,214,143,.12);
  --red:#f4604e;    --red-soft:rgba(244,96,78,.12);
  --purple:#b88ff5; --purple-soft:rgba(184,143,245,.13);
  --gray:#a8a294;   --gray-soft:rgba(168,162,148,.10);
  --glow:.7;
  --shadow:none;
  --shadow-lg:0 18px 50px rgba(0,0,0,.5);
  --header-bg:rgba(12,11,9,.88);
  --halo:radial-gradient(1100px 500px at 50% -200px, rgba(224,154,82,.05), transparent 60%);
  --stripe:rgba(255,255,255,.018);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{
  background:var(--halo),var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  min-height:100vh;
  transition:background-color .25s,color .25s;
}
::selection{background:var(--accent-soft);}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:10;
  background:var(--header-bg);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.hd-inner{
  max-width:1240px;margin:0 auto;padding:0 28px;
  display:flex;align-items:center;gap:28px;height:58px;
}
.wordmark{display:flex;align-items:baseline;gap:9px;flex-shrink:0;}
.wordmark .bolt{font-size:17px;}
.wordmark .name{font-family:var(--mono);font-weight:700;font-size:17px;letter-spacing:-.02em;}
.wordmark .name em{font-style:normal;color:var(--accent);}
nav{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
.tab{
  appearance:none;border:0;background:none;cursor:pointer;
  font-family:var(--sans);font-size:14px;font-weight:500;color:var(--dim);
  padding:8px 13px;border-radius:8px;white-space:nowrap;
  transition:color .15s,background .15s;
  display:flex;align-items:center;gap:7px;
}
.tab:hover{color:var(--text);background:var(--panel-2);}
.tab.active{color:var(--text);background:var(--panel-3);box-shadow:inset 0 0 0 1px var(--border-2);}
.tab .ct{font-family:var(--mono);font-size:10.5px;color:var(--faint);background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:0 5px;line-height:16px;}
.tab.active .ct{color:var(--accent);border-color:var(--border-2);}
.stamp{font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap;flex-shrink:0;}
.stamp b{color:var(--dim);font-weight:500;}
.theme-toggle{
  appearance:none;border:1px solid var(--border);background:var(--panel-2);cursor:pointer;
  font-size:15px;line-height:1;width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,transform .15s;
}
.theme-toggle:hover{border-color:var(--border-2);background:var(--panel-3);transform:translateY(-1px);}
.theme-toggle:active{transform:translateY(0);}

/* ---------- layout ---------- */
main{max-width:1240px;margin:0 auto;padding:26px 28px 70px;}
.view{display:none;}
.view.active{display:block;animation:rise .32s cubic-bezier(.22,.8,.3,1);}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){.view.active{animation:none;}}

.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);}
.card-pad{padding:20px 22px;}
.card-label{
  font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--faint);margin-bottom:14px;
}
code,pre{font-family:var(--mono);}
.cmd{
  font-family:var(--mono);font-size:12px;color:var(--accent);
  background:var(--accent-soft);border:1px solid rgba(224,154,82,.25);
  border-radius:6px;padding:2px 7px;white-space:nowrap;
}

/* ---------- overview ---------- */
.drift-banner{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--purple-soft);border:1px solid rgba(184,143,245,.3);
  border-radius:var(--r);padding:12px 18px;margin-bottom:18px;
  animation:rise .4s ease;
}
.drift-banner .msg{font-weight:500;color:var(--text);}
.drift-banner .msg b{color:var(--purple);font-weight:600;}
.ov-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;}
.hero{display:flex;flex-direction:column;justify-content:space-between;min-height:300px;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.hero-num{
  font-family:var(--mono);font-weight:700;font-size:clamp(72px,9vw,118px);
  line-height:.95;letter-spacing:-.05em;color:var(--text);
  font-variant-numeric:tabular-nums;
}
.hero-num .pct{font-size:.42em;color:var(--accent);font-weight:500;margin-left:4px;}
.hero-sub{font-family:var(--mono);font-size:13px;color:var(--dim);margin-top:10px;}
.hero-sub b{color:var(--text);font-weight:500;}
.blockbar{
  font-family:var(--mono);font-size:15px;letter-spacing:1px;line-height:1;
  color:var(--accent);margin-top:26px;white-space:nowrap;overflow:hidden;
}
.blockbar .empty{color:var(--border-2);}
.fillbar{height:7px;border-radius:99px;background:var(--panel-3);margin-top:12px;overflow:hidden;}
.fillbar i{
  display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,#9a5e2a,var(--accent));
  box-shadow:0 0 14px rgba(224,154,82,.45);
  transition:width 1.1s cubic-bezier(.25,.9,.3,1);
}
.ov-side{display:flex;flex-direction:column;gap:18px;}
.pills{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pill{
  display:flex;align-items:center;gap:11px;padding:13px 15px;
  border-radius:9px;border:1px solid var(--border);background:var(--panel-2);
}
.pill .dot{font-size:15px;}
.pill .n{font-family:var(--mono);font-weight:700;font-size:21px;font-variant-numeric:tabular-nums;}
.pill .lb{font-size:12px;color:var(--dim);line-height:1.2;}
.pill.green{border-color:rgba(63,214,143,.3);background:var(--green-soft);}  .pill.green .n{color:var(--green);}
.pill.red{border-color:rgba(244,96,78,.3);background:var(--red-soft);}       .pill.red .n{color:var(--red);}
.pill.purple{border-color:rgba(184,143,245,.3);background:var(--purple-soft);}.pill.purple .n{color:var(--purple);}
.pill.gray{border-color:var(--border-2);background:var(--gray-soft);}        .pill.gray .n{color:var(--gray);}
.approval-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:14px;}
.approval-line .who{font-weight:600;}
.approval-line .ids{font-family:var(--mono);font-size:12px;color:var(--accent);}
.approval-line .when{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-left:auto;}
.strip{display:flex;align-items:flex-end;gap:5px;height:34px;margin-top:2px;}
.strip i{
  flex:1;min-width:8px;border-radius:3px 3px 1px 1px;background:var(--border-2);
  transform-origin:bottom;animation:pop .5s ease backwards;
}
@keyframes pop{from{transform:scaleY(0);}to{transform:scaleY(1);}}
.legend{
  margin-top:18px;font-family:var(--mono);font-size:11.5px;color:var(--dim);
  display:flex;gap:18px;flex-wrap:wrap;padding:0 4px;
}
.legend span b{font-weight:500;color:var(--text);}
.legend .note{color:var(--faint);}

/* ---------- proof lights ---------- */
.light{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.light.green{background:var(--green);box-shadow:0 0 7px color-mix(in srgb,var(--green) calc(var(--glow)*100%),transparent);}
.light.red{background:var(--red);box-shadow:0 0 7px color-mix(in srgb,var(--red) calc(var(--glow)*100%),transparent);}
.light.purple{background:var(--purple);box-shadow:0 0 7px color-mix(in srgb,var(--purple) calc(var(--glow)*100%),transparent);}
.light.gray{background:none;border:1.5px solid var(--gray);width:8px;height:8px;}

/* ---------- tasks ---------- */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.seg{display:flex;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:3px;}
.seg button{
  appearance:none;border:0;background:none;cursor:pointer;color:var(--dim);
  font-family:var(--sans);font-size:13px;font-weight:500;padding:5px 13px;border-radius:7px;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.seg button:hover{color:var(--text);}
.seg button.on{background:var(--panel-3);color:var(--text);box-shadow:inset 0 0 0 1px var(--border-2);}
.toolbar .summary{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--faint);}
.task-list{display:flex;flex-direction:column;gap:10px;}
.task{overflow:hidden;transition:border-color .15s;}
.task-row{display:flex;align-items:center;gap:14px;padding:14px 18px;}
.task.expandable .task-row{cursor:pointer;}
.task.expandable:hover{border-color:var(--border-2);}
.task .st{font-size:17px;width:24px;text-align:center;flex-shrink:0;}
.task .tid{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;width:74px;flex-shrink:0;}
.task .ttl{font-weight:500;flex:1;min-width:140px;}
.task .checks{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.check-chip{
  display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;
  color:var(--dim);background:var(--panel-2);border:1px solid var(--border);
  border-radius:6px;padding:4px 9px;
}
.task .caret{color:var(--faint);font-size:11px;transition:transform .2s;width:14px;text-align:center;}
.task.open .caret{transform:rotate(90deg);}
.task-tail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease;}
.task.open .task-tail{grid-template-rows:1fr;}
.task-tail > div{overflow:hidden;}
.terminal{
  margin:0 18px 16px 56px;background:#0a0908;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
}
.terminal .t-head{
  display:flex;align-items:center;gap:10px;padding:7px 13px;
  border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--faint);
}
.terminal .t-head .fail{color:var(--red);font-weight:500;}
.terminal pre{padding:13px 15px;font-size:12.5px;color:var(--red);white-space:pre-wrap;line-height:1.6;}
.status-done .ttl{color:var(--dim);}

/* ---------- requirements ---------- */
table.req{width:100%;border-collapse:collapse;}
table.req th{
  text-align:left;font-family:var(--mono);font-size:10.5px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:var(--faint);
  padding:12px 16px;border-bottom:1px solid var(--border);
}
table.req td{padding:15px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.req tr:last-child td{border-bottom:0;}
table.req tr{transition:background .15s;}
table.req tbody tr:hover{background:var(--panel-2);}
.req-id{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;}
.req-title{font-weight:500;margin-top:2px;}
.crit-chips{display:flex;gap:7px;flex-wrap:wrap;}
.crit{
  display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
  color:var(--dim);background:var(--panel-2);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;
}
.badge{
  display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
  font-weight:500;letter-spacing:.06em;border-radius:6px;padding:3px 9px;
}
.badge.proven{color:var(--green);background:var(--green-soft);border:1px solid rgba(63,214,143,.3);}
.badge.unproven{color:var(--gray);background:var(--gray-soft);border:1px solid var(--border-2);}
.worst{display:flex;align-items:center;gap:9px;font-size:15px;}
.appr-cell{font-size:15px;text-align:center;}
.appr-cell .dash{color:var(--faint);font-family:var(--mono);}

/* ---------- graph ---------- */
.graph-shell{position:relative;min-height:440px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.graph-shell .stripes{
  position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent 0 14px,var(--stripe) 14px 28px);
}
.graph-ph{
  position:relative;text-align:center;font-family:var(--mono);color:var(--faint);
  font-size:12.5px;line-height:2;
}
.graph-ph .big{font-size:30px;display:block;margin-bottom:6px;}
.graph-ph b{color:var(--dim);font-weight:500;}
.edge-legend{display:flex;gap:24px;flex-wrap:wrap;margin-top:16px;padding:0 4px;}
.edge-legend span{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;color:var(--dim);}
.edge{width:30px;height:0;border-top:2px solid;}
.edge.green{border-color:var(--green);}
.edge.red{border-color:var(--red);}
.edge.purple{border-color:var(--purple);border-top-style:dashed;}
.edge.gray{border-color:var(--gray);border-top-style:dotted;}

/* ---------- activity ---------- */
.feed{display:flex;flex-direction:column;}
.evt{display:flex;align-items:baseline;gap:14px;padding:13px 6px;border-bottom:1px solid var(--border);}
.evt:last-child{border-bottom:0;}
.evt .ic{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
.evt .tx{flex:1;font-size:14px;}
.evt .tx code{font-size:12.5px;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:1px 6px;}
.evt .meta{display:flex;gap:6px;flex-shrink:0;}
.chip{
  font-family:var(--mono);font-size:10.5px;color:var(--dim);
  background:var(--panel-2);border:1px solid var(--border);border-radius:99px;padding:2px 9px;
}
.evt .when{font-family:var(--mono);font-size:11px;color:var(--faint);width:74px;text-align:right;flex-shrink:0;}
.feed-section{margin-top:26px;}

/* ---------- files ---------- */
.files-grid{display:grid;grid-template-columns:248px 1fr;gap:18px;align-items:start;}
.file-nav{position:sticky;top:84px;padding:10px;}
.fgroup{margin-bottom:6px;}
.fgroup-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--faint);padding:9px 10px 5px;
}
.fitem{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;
  appearance:none;border:0;background:none;cursor:pointer;
  font-family:var(--mono);font-size:12.5px;color:var(--dim);
  padding:7px 10px;border-radius:7px;transition:all .13s;
}
.fitem:hover{color:var(--text);background:var(--panel-2);}
.fitem.on{color:var(--text);background:var(--panel-3);box-shadow:inset 2px 0 0 var(--accent);}
.fitem .fic{font-size:12px;opacity:.8;}
.file-pane{min-height:480px;}
.file-head{
  display:flex;align-items:center;gap:10px;padding:14px 24px;
  border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--faint);
}
.file-head b{color:var(--accent);font-weight:500;}
.md{padding:26px 30px 36px;max-width:760px;}
.md h1{font-size:26px;font-weight:600;letter-spacing:-.02em;margin:6px 0 16px;}
.md h2{font-size:18px;font-weight:600;margin:26px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.md h3{font-size:15px;font-weight:600;margin:20px 0 8px;}
.md h4{font-size:13.5px;font-weight:600;margin:16px 0 6px;color:var(--dim);}
.md p{margin:0 0 12px;color:var(--text);text-wrap:pretty;}
.md ul,.md ol{margin:0 0 14px;padding-left:22px;display:flex;flex-direction:column;gap:5px;}
.md li{color:var(--text);}
.md strong{font-weight:600;}
.md em{color:var(--dim);}
.md a{color:var(--accent);}
.md code{
  font-size:.86em;background:var(--panel-3);border:1px solid var(--border-2);
  border-radius:5px;padding:1px 6px;color:var(--accent);
}
.md pre{
  background:#0a0908;border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;margin:0 0 14px;overflow-x:auto;
}
.md pre code{background:none;border:0;padding:0;color:var(--text);font-size:12.5px;line-height:1.65;}
.md blockquote{
  border-left:2px solid var(--accent);background:var(--accent-soft);
  border-radius:0 7px 7px 0;padding:10px 16px;margin:0 0 14px;color:var(--dim);
}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13.5px;}
.md th{
  text-align:left;font-family:var(--mono);font-size:10.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--faint);
  padding:9px 13px;border-bottom:1px solid var(--border-2);background:var(--panel-2);
}
.md th:first-child{border-radius:7px 0 0 0;}
.md th:last-child{border-radius:0 7px 0 0;}
.md td{padding:9px 13px;border-bottom:1px solid var(--border);}
.md hr{border:0;border-top:1px solid var(--border);margin:20px 0;}
.md .directive{
  display:block;font-family:var(--mono);font-size:12px;color:var(--purple);
  background:var(--purple-soft);border:1px solid rgba(184,143,245,.25);
  border-radius:7px;padding:8px 13px;margin:0 0 12px;
}

/* ---------- empty states ---------- */
.empty{
  padding:56px 20px;text-align:center;color:var(--faint);
  font-family:var(--mono);font-size:13px;
}
.empty .e-ic{font-size:26px;display:block;margin-bottom:12px;opacity:.6;}
.empty code{color:var(--accent);}

/* ---------- responsive ---------- */
@media (max-width:1120px){
  .stamp{display:none;}
}
@media (max-width:900px){
  .ov-grid{grid-template-columns:1fr;}
  .files-grid{grid-template-columns:1fr;}
  .file-nav{position:static;}
  .hd-inner{padding:0 16px;gap:14px;}
  main{padding:20px 16px 60px;}
  .task .checks{display:none;}
  table.req th:nth-child(4),table.req td:nth-child(4){display:none;}
}

/* ===== gate trail (TRAIL-01) ===== */
.gate-chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 8px}
.gate-chip{font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:20px;border:1px solid var(--line)}
.gate-chip.g-ok{color:#7ee2a8;border-color:rgba(63,185,80,.4)}
.gate-chip.g-bad{color:#ffa198;border-color:rgba(248,81,73,.45)}
.gate-chip.g-mut{color:var(--dim)}
.trail{margin:4px 0 8px;border-left:2px solid var(--line);padding-left:10px}
.trail-row{display:flex;gap:8px;align-items:baseline;font-family:var(--mono);font-size:11.5px;padding:2px 0;color:var(--dim)}
.trail-row .t-at{color:var(--faint)}

<body>

<header>
  <div class="hd-inner">
    <div class="wordmark"><span class="bolt">🔩</span><span class="name">rivet<em>_</em></span></div>
    <nav id="tabs"></nav>
    <div class="stamp" id="stamp"></div>
    <button class="theme-toggle" id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme">🌙</button>
  </div>
</header>

<main>
  <section class="view" id="view-overview" data-screen-label="Overview"></section>
  <section class="view" id="view-tasks" data-screen-label="Tasks"></section>
  <section class="view" id="view-requirements" data-screen-label="Requirements"></section>
  <section class="view" id="view-graph" data-screen-label="Graph"></section>
  <section class="view" id="view-activity" data-screen-label="Activity"></section>
  <section class="view" id="view-files" data-screen-label="Files"></section>
</main>

<script>
/* ================= DATA (injected by `rivet dashboard`) ================= */
const DATA = {
  project: "rivet",
  generatedAt: "2026-06-12T09:30:00Z",
  completion: { done: 24, total: 27 },
  validates: { green: 18, red: 1, stale: 4, unproven: 2 },
  tasks: [
    { id: "DASH-01", title: "dashboard v1", status: "done",
      boundChecks: ["test/dashboard.test.ts"], results: { "test/dashboard.test.ts": { passed: true, at: "2026-06-12T09:00:00Z", kind: "unit", flaky: false } } },
    { id: "WAVE-02", title: "wave cleanup", status: "in_progress",
      boundChecks: ["test/wave-done.test.ts"], results: { "test/wave-done.test.ts": { passed: false, at: "2026-06-12T08:50:00Z", kind: "unit", tail: "AssertionError: expected branch gone" } } },
    { id: "STEER-01", title: "laws engine", status: "pending", boundChecks: ["test/steering.test.ts"], results: {} },
  ],
  requirements: [
    { id: "R-GREET-01", title: "personalized greeting", proven: true,  criteria: [{ id: "AC1", proof: "green" }] },
    { id: "R-GREET-02", title: "missing name default",  proven: false, criteria: [{ id: "AC1", proof: "stale" }, { id: "AC2", proof: "unproven" }] },
  ],
  approvals: [ { at: "2026-06-11T21:00:00Z", approver: "Pratiyush", taskIds: ["T1","R-GREET-01"] } ],
  governance: [ { at: "2026-06-12T07:10:00Z", kind: "unlock", detail: "test/foo.test.ts for 30m" } ],
  activity: [
    { at: "2026-06-12T09:00:12Z", icon: "✅", text: "check test/dashboard.test.ts → DASH-01", meta: "Pratiyush · claude" },
    { at: "2026-06-12T09:00:30Z", icon: "🏁", text: "task DASH-01 → done" },
    { at: "2026-06-12T08:50:02Z", icon: "❌", text: "check test/wave-done.test.ts → WAVE-02" },
  ],
  graphHtml: "graph-placeholder",
  drift: 5,
  files: [
    { name: "laws.md",      content: "# Project Laws\n\n## Hard rules\n- A task is not done until its bound checks pass.\n- Commits are authored by the human.\n" },
    { name: "learnings.md", content: "# Learnings\n\n## 2026-06-12 Fixtures pin git config\n- Trigger: host init.defaultBranch broke fixtures.\n- Lesson: pin `-b main` + `HEAD:main`.\n- Promoted to: check:test/wave.test.ts\n" },
    { name: "specs/greeting.md", content: "# Feature: Greeting API\n\n## Requirement R-GREET-01 — personalized greeting\nWHEN a GET request hits `/greet` THEN the system SHALL respond 200.\n\n@check kind=api ref=GreetControllerTest#greet\n" },
    { name: "LEDGER.md",    content: "# LEDGER\n\n## Progress board\n**24/27 done (89%)**\n" },
    { name: "TRACKING.md",  content: "# TRACKING\n\n| Req | Proof | Approved |\n|---|---|---|\n| R-GREET-01 | 🟢 | ✅ |\n" },
    { name: "RESUME.md",    content: "# RESUME\n\n## THE ONE OPEN ACTION\n→ **WAVE-02** — wave cleanup\n" },
    { name: "DEFER.md",     content: "# DEFER\n\n## Intake adapters\n- **Why deferred:** CLI input only for now.\n- **To revisit:** at team usage.\n" },
    { name: "approvals/2026-06-11-T1.md", content: "# Approval — T1\n- **Approved by:** Pratiyush\n- **Commit:** 9d9cc2d5\n" }
  ]
};

/* ================= helpers ================= */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const NOW = new Date(DATA.generatedAt).getTime();
function rel(iso){
  const d = Math.max(0, NOW - new Date(iso).getTime());
  const m = Math.round(d/60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m/60);
  if (h < 24) return h + 'h ago';
  return Math.round(h/24) + 'd ago';
}
function clock(iso){
  const d = new Date(iso);
  return String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0');
}
const PROOF = {
  green:    { e:'🟢', cls:'green',  label:'proven'   },
  red:      { e:'🔴', cls:'red',    label:'failing'  },
  stale:    { e:'🟣', cls:'purple', label:'stale'    },
  unproven: { e:'⚪', cls:'gray',   label:'unproven' },
};
const STATUS = { done:'✅', in_progress:'🔨', blocked:'🚧', pending:'⬜' };
const approvedIds = new Set((DATA.approvals||[]).flatMap(a => a.taskIds));
function checkProof(t, c){
  const r = t.results && t.results[c];
  if (!r) return 'unproven';
  return r.passed ? 'green' : 'red';
}
function emptyState(icon, text){
  return '<div class="empty"><span class="e-ic">' + icon + '</span>' + text + '</div>';
}

/* ================= overview ================= */
function renderOverview(){
  const v = $('#view-overview');
  const c = DATA.completion, pct = c.total ? Math.round(c.done / c.total * 100) : 0;
  const open = c.total - c.done;
  const val = DATA.validates;
  let html = '';
  if (DATA.drift > 0){
    html += '<div class="drift-banner"><span class="msg">🟣 <b>' + DATA.drift + ' proofs red/stale</b> — code moved or checks failed since last verify</span>' +
            '<span class="cmd">$ rivet drift</span></div>';
  }
  html += '<div class="ov-grid">';
  html += '<div class="card card-pad hero">' +
            '<div><div class="card-label">🔩 Riveted · evidence-bound done</div>' +
            '<div class="hero-num"><span id="heroNum">0</span><span class="pct">%</span></div>' +
            '<div class="hero-sub"><b>' + c.done + '</b> of <b>' + c.total + '</b> tasks riveted to passing checks · ' + open + ' open</div></div>' +
            '<div><div class="blockbar" id="blockbar"></div>' +
            '<div class="fillbar"><i id="fillbar"></i></div></div>' +
          '</div>';
  html += '<div class="ov-side">';
  html += '<div class="card card-pad"><div class="card-label">🚦 Proof states</div><div class="pills">' +
            pill('green', val.green, 'proven') + pill('red', val.red, 'failing') +
            pill('purple', val.stale, 'stale') + pill('gray', val.unproven, 'unproven') +
          '</div></div>';
  const ap = (DATA.approvals||[])[0];
  html += '<div class="card card-pad"><div class="card-label">🔏 Latest approval</div>' +
          (ap
            ? '<div class="approval-line"><span>🔏</span><span class="who">' + esc(ap.approver) + '</span>' +
              '<span class="ids">' + ap.taskIds.map(esc).join(' · ') + '</span>' +
              '<span class="when">' + rel(ap.at) + '</span></div>'
            : '<div class="approval-line"><span>🔏</span><span style="color:var(--faint)">none yet — <code class="cmd">rivet approve</code></span></div>') +
          '</div>';
  html += '<div class="card card-pad"><div class="card-label">📈 Last ' + DATA.activity.length + ' events</div><div class="strip" id="strip"></div></div>';
  html += '</div></div>';
  html += '<div class="legend">' +
          '<span>🟢 <b>green</b> — proven</span>' +
          '<span>🔴 <b>red</b> — check failing</span>' +
          '<span>🟣 <b>stale</b> <span class="note">— code moved, re-verify (not broken)</span></span>' +
          '<span>⚪ <b>unproven</b> — no evidence yet</span>' +
          '</div>';
  v.innerHTML = html;

  // sparkline strip
  const strip = $('#strip');
  const tone = { '✅':'var(--green)', '❌':'var(--red)', '🏁':'var(--accent)', '🔏':'var(--purple)', '🛡️':'var(--purple)', '🧾':'var(--gray)' };
  [...DATA.activity].reverse().forEach((e, i) => {
    const bar = document.createElement('i');
    const hs = [60, 100, 75, 45, 88, 55][i % 6];
    bar.style.height = hs + '%';
    bar.style.background = tone[e.icon] || 'var(--border-2)';
    bar.style.opacity = '.85';
    bar.style.animationDelay = (i * 70) + 'ms';
    bar.title = e.icon + ' ' + e.text + ' · ' + rel(e.at);
    strip.appendChild(bar);
  });
}
function pill(cls, n, lb){
  return '<div class="pill ' + cls + '"><span class="light ' + cls + '"></span><span class="n">' + n + '</span><span class="lb">' + lb + '</span></div>';
}
let heroAnimated = false;
function setHeroFinal(pct, target, CELLS){
  const numEl = $('#heroNum'), blockEl = $('#blockbar'), fillEl = $('#fillbar');
  if (!numEl) return;
  numEl.textContent = pct;
  blockEl.innerHTML = '█'.repeat(target) + '<span class="empty">' + '░'.repeat(CELLS - target) + '</span>';
  fillEl.style.width = pct + '%';
}
function animateHero(){
  if (heroAnimated) return;
  heroAnimated = true;
  const c = DATA.completion, pct = c.total ? Math.round(c.done / c.total * 100) : 0;
  const numEl = $('#heroNum'), blockEl = $('#blockbar'), fillEl = $('#fillbar');
  if (!numEl) return;
  const CELLS = 28, target = Math.round(pct / 100 * CELLS);
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  // Render final state immediately so the hero is correct even if rAF never fires.
  setHeroFinal(pct, target, CELLS);
  if (reduced) return;
  // Then animate from 0 → final, but only if frames actually run.
  let started = false;
  const t0 = performance.now(), DUR = 1100;
  function frame(t){
    started = true;
    const p = Math.min(1, (t - t0) / DUR);
    const e = 1 - Math.pow(1 - p, 3); // ease-out cubic
    numEl.textContent = Math.round(e * pct);
    const f = Math.round(e * target);
    blockEl.innerHTML = '█'.repeat(f) + '<span class="empty">' + '░'.repeat(CELLS - f) + '</span>';
    if (p < 1) requestAnimationFrame(frame);
    else setHeroFinal(pct, target, CELLS);
  }
  // start from 0 for the count-up, but guard: if no frame fires soon, leave final state.
  numEl.textContent = '0';
  blockEl.innerHTML = '<span class="empty">' + '░'.repeat(CELLS) + '</span>';
  fillEl.style.width = '0%';
  requestAnimationFrame(() => { fillEl.style.width = pct + '%'; });
  requestAnimationFrame(frame);
  setTimeout(() => { if (!started) setHeroFinal(pct, target, CELLS); }, 320);
}

/* ================= tasks ================= */
let taskFilter = 'all';
function renderTasks(){
  const v = $('#view-tasks');
  const counts = {
    all: DATA.tasks.length,
    red: DATA.tasks.filter(hasRed).length,
    in_progress: DATA.tasks.filter(t => t.status === 'in_progress').length,
  };
  let html = '<div class="toolbar"><div class="seg" id="taskSeg">' +
    segBtn('all', 'All', counts.all) +
    segBtn('red', '🔴 Failing', counts.red) +
    segBtn('in_progress', '🔨 In progress', counts.in_progress) +
    '</div><span class="summary">✅ done · 🔨 in progress · 🚧 blocked · ⬜ pending</span></div>';

  const list = DATA.tasks.filter(t =>
    taskFilter === 'all' ? true :
    taskFilter === 'red' ? hasRed(t) :
    t.status === 'in_progress');

  if (!DATA.tasks.length){
    html += '<div class="card">' + emptyState('⬜', 'no tasks yet — <code>rivet spec tasks</code>') + '</div>';
  } else if (!list.length){
    html += '<div class="card">' + emptyState('🔍', 'nothing matches this filter') + '</div>';
  } else {
    html += '<div class="task-list">' + list.map(taskCard).join('') + '</div>';
  }
  v.innerHTML = html;

  v.querySelectorAll('#taskSeg button').forEach(b => {
    b.addEventListener('click', () => { taskFilter = b.dataset.f; renderTasks(); });
  });
  v.querySelectorAll('.task.expandable .task-row').forEach(r => {
    r.addEventListener('click', () => r.parentElement.classList.toggle('open'));
  });
}
function hasRed(t){ return t.boundChecks.some(c => checkProof(t, c) === 'red'); }
function segBtn(f, lb, n){
  return '<button data-f="' + f + '" class="' + (taskFilter === f ? 'on' : '') + '">' + lb +
         ' <span class="ct" style="font-family:var(--mono);font-size:10.5px;color:var(--faint)">' + n + '</span></button>';
}
function taskCard(t){
  const failing = t.boundChecks.filter(c => checkProof(t, c) === 'red');
  const hasTrail = t.trail && t.trail.timeline && t.trail.timeline.length > 0;
  const expandable = failing.length > 0 || hasTrail;
  const chips = t.boundChecks.map(c => {
    const p = checkProof(t, c);
    return '<span class="check-chip"><span class="light ' + PROOF[p].cls + '"></span>' + esc(c) + '</span>';
  }).join('');
  let tail = '';
  if (expandable){
    let inner = '';
    if (hasTrail){
      const OUT = { red:'🔴', green:'🟢', blocked:'⛔', passed:'🏁', recorded:'🔏', bound:'🔗', synced:'🔁', started:'▶️' };
      const ok = v => { v = String(v); return v.startsWith('passed') || v === 'green' || v === 'done' || v === 'recorded'; };
      const bad = v => { v = String(v); return v.startsWith('blocked') || v === 'red'; };
      inner += '<div class="gate-chips">' + Object.entries(t.trail.summary || {}).map(([g, v]) =>
        '<span class="gate-chip ' + (ok(v) ? 'g-ok' : bad(v) ? 'g-bad' : 'g-mut') + '">' + esc(g) + ' · ' + esc(v) + '</span>'
      ).join('') + '</div>';
      inner += '<div class="trail">' + t.trail.timeline.map(ev =>
        '<div class="trail-row"><span class="t-at">' + esc(String(ev.at || '').slice(11, 16)) + '</span>' +
        '<span class="t-ic">' + (OUT[ev.outcome] || '·') + '</span>' +
        '<span class="t-g">' + esc(ev.gate) + '</span><span class="t-o">' + esc(ev.outcome) + '</span>' +
        (ev.detail ? '<span class="t-d">' + esc(ev.detail) + '</span>' : '') + '</div>'
      ).join('') + '</div>';
    }
    if (failing.length > 0){
      inner += failing.map(c => {
        const r = t.results[c];
        return '<div class="terminal"><div class="t-head"><span class="fail">✗ FAIL</span><span>' + esc(c) + '</span>' +
               '<span>' + esc(r.kind) + '</span><span style="margin-left:auto">' + rel(r.at) + '</span></div>' +
               '<pre>' + esc(r.tail || '(no output captured)') + '</pre></div>';
      }).join('');
    }
    tail = '<div class="task-tail"><div>' + inner + '</div></div>';
  }
  return '<div class="card task status-' + t.status + (expandable ? ' expandable' : '') + '">' +
    '<div class="task-row">' +
      '<span class="st">' + (STATUS[t.status] || '⬜') + '</span>' +
      '<span class="tid">' + esc(t.id) + '</span>' +
      '<span class="ttl">' + esc(t.title) + '</span>' +
      '<span class="checks">' + chips + '</span>' +
      '<span class="caret">' + (expandable ? '▶' : '') + '</span>' +
    '</div>' + tail + '</div>';
}

/* ================= requirements ================= */
function renderRequirements(){
  const v = $('#view-requirements');
  if (!DATA.requirements.length){
    v.innerHTML = '<div class="card">' + emptyState('📐', 'no requirements yet — <code>rivet spec requirements</code>') + '</div>';
    return;
  }
  const order = { red: 0, stale: 1, unproven: 2, green: 3 };
  const rows = DATA.requirements.map(r => {
    const worst = r.criteria.reduce((w, c) => order[c.proof] < order[w] ? c.proof : w, 'green');
    const crits = r.criteria.map(c =>
      '<span class="crit"><span class="light ' + PROOF[c.proof].cls + '"></span>' + esc(c.id) + '</span>').join('');
    const approved = approvedIds.has(r.id);
    return '<tr>' +
      '<td><div class="req-id">' + esc(r.id) + '</div><div class="req-title">' + esc(r.title) + '</div></td>' +
      '<td><div class="crit-chips">' + crits + '</div></td>' +
      '<td><div class="worst">' + PROOF[worst].e + '<span style="font-family:var(--mono);font-size:11.5px;color:var(--dim)">' + PROOF[worst].label + '</span></div></td>' +
      '<td><span class="badge ' + (r.proven ? 'proven' : 'unproven') + '">' + (r.proven ? '● PROVEN' : '○ UNPROVEN') + '</span></td>' +
      '<td class="appr-cell">' + (approved ? '✅' : '<span class="dash">—</span>') + '</td>' +
    '</tr>';
  }).join('');
  v.innerHTML = '<div class="card"><table class="req">' +
    '<thead><tr><th>Requirement</th><th>Criteria</th><th>Proof (worst-of)</th><th>Definition of done</th><th>Approved</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>' +
    '<div class="legend" style="margin-top:14px">' +
    '<span>🟢 <b>green</b> — proven</span><span>🔴 <b>red</b> — failing</span>' +
    '<span>🟣 <b>stale</b> <span class="note">— code moved, re-verify</span></span><span>⚪ <b>unproven</b></span></div>';
}

/* ================= graph ================= */
function renderGraph(){
  const v = $('#view-graph');
  let inner;
  if (DATA.graphHtml){
    inner = '<div class="card graph-shell"><div class="stripes"></div>' +
      '<div class="graph-ph"><span class="big">🕸️</span>' +
      '<b>requirement → check graph</b><br>' +
      'iframe panel · injected by <b>rivet dashboard</b><br>' +
      '&lt;iframe srcdoc="' + esc(DATA.graphHtml) + '"&gt;</div></div>';
  } else {
    inner = '<div class="card">' + emptyState('🕸️', 'no graph yet — <code>rivet graph</code>') + '</div>';
  }
  v.innerHTML = inner +
    '<div class="edge-legend">' +
    '<span><span class="edge green"></span>proven edge</span>' +
    '<span><span class="edge red"></span>failing edge</span>' +
    '<span><span class="edge purple"></span>stale — re-verify</span>' +
    '<span><span class="edge gray"></span>unproven edge</span>' +
    '</div>';
}

/* ================= activity ================= */
function renderActivity(){
  const v = $('#view-activity');
  let html = '';
  if (!DATA.activity.length){
    html = '<div class="card">' + emptyState('🧾', 'journal is empty — events appear as checks run') + '</div>';
  } else {
    html = '<div class="card" style="padding:6px 18px"><div class="feed">' +
      DATA.activity.map(e => {
        const meta = e.meta ? e.meta.split('·').map(m => '<span class="chip">' + esc(m.trim()) + '</span>').join('') : '';
        return '<div class="evt"><span class="ic">' + e.icon + '</span>' +
          '<span class="tx">' + fmtEvent(e.text) + '</span>' +
          '<span class="meta">' + meta + '</span>' +
          '<span class="when">' + clock(e.at) + ' · ' + rel(e.at) + '</span></div>';
      }).join('') + '</div></div>';
  }
  if ((DATA.governance || []).length){
    html += '<div class="feed-section"><div class="card-label">Governance</div>' +
      '<div class="card" style="padding:6px 18px"><div class="feed">' +
      DATA.governance.map(g =>
        '<div class="evt"><span class="ic">🛡️</span>' +
        '<span class="tx">' + esc(g.kind) + ' — <code>' + esc(g.detail) + '</code></span>' +
        '<span class="when">' + clock(g.at) + ' · ' + rel(g.at) + '</span></div>').join('') +
      '</div></div></div>';
  }
  v.innerHTML = html;
}
function fmtEvent(text){
  // wrap path-looking tokens in <code>
  return esc(text).replace(/(\S+\/\S+)/g, '<code>$1</code>');
}

/* ================= files ================= */
let currentFile = (DATA.files[0] || {}).name;
function renderFiles(){
  const v = $('#view-files');
  if (!DATA.files.length){
    v.innerHTML = '<div class="card">' + emptyState('📁', 'no artifacts yet — <code>rivet init</code> scaffolds .rivet/') + '</div>';
    return;
  }
  const groups = {};
  DATA.files.forEach(f => {
    const dir = f.name.includes('/') ? f.name.split('/')[0] + '/' : '.rivet/';
    (groups[dir] = groups[dir] || []).push(f);
  });
  const orderedDirs = ['.rivet/', ...Object.keys(groups).filter(d => d !== '.rivet/').sort()];
  const nav = orderedDirs.map(dir =>
    '<div class="fgroup"><div class="fgroup-label">' + esc(dir) + '</div>' +
    groups[dir].map(f =>
      '<button class="fitem' + (f.name === currentFile ? ' on' : '') + '" data-file="' + esc(f.name) + '">' +
      '<span class="fic">▤</span>' + esc(f.name.includes('/') ? f.name.split('/').slice(1).join('/') : f.name) + '</button>').join('') +
    '</div>').join('');
  const file = DATA.files.find(f => f.name === currentFile) || DATA.files[0];
  v.innerHTML = '<div class="files-grid">' +
    '<div class="card file-nav">' + nav + '</div>' +
    '<div class="card file-pane">' +
      '<div class="file-head">📄 <b>.rivet/' + esc(file.name) + '</b><span style="margin-left:auto">' + file.content.split('\n').length + ' lines · markdown</span></div>' +
      '<div class="md">' + renderMarkdown(file.content) + '</div>' +
    '</div></div>';
  v.querySelectorAll('.fitem').forEach(b => {
    b.addEventListener('click', () => { currentFile = b.dataset.file; renderFiles(); });
  });
}

/* ====== minimal markdown renderer (escapes raw HTML; no libraries) ====== */
function renderMarkdown(src){
  const inline = s => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[\s(])\*([^*]+)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  const lines = src.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length){
    const l = lines[i];
    if (/^```/.test(l)){                                   // fenced code
      const buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++;
      out.push('<pre><code>' + esc(buf.join('\n')) + '</code></pre>');
    } else if (/^#{1,4} /.test(l)){                        // headings
      const n = l.match(/^#+/)[0].length;
      out.push('<h' + n + '>' + inline(l.replace(/^#+ /, '')) + '</h' + n + '>'); i++;
    } else if (/^\s*---+\s*$/.test(l)){                    // hr
      out.push('<hr></hr>'); i++;
    } else if (/^\|/.test(l)){                             // table
      const rows = [];
      while (i < lines.length && /^\|/.test(lines[i])) rows.push(lines[i++]);
      const cells = r => r.replace(/^\|/, '').replace(/\|\s*$/, '').split('|').map(c => inline(c.trim()));
      let t = '<table><thead><tr>' + cells(rows[0]).map(c => '<th>' + c + '</th>').join('') + '</tr></thead><tbody>';
      for (let r = 1; r < rows.length; r++){
        if (/^[\s|:-]+$/.test(rows[r])) continue;          // separator row
        t += '<tr>' + cells(rows[r]).map(c => '<td>' + c + '</td>').join('') + '</tr>';
      }
      out.push(t + '</tbody></table>');
    } else if (/^> ?/.test(l)){                            // blockquote
      const buf = [];
      while (i < lines.length && /^> ?/.test(lines[i])) buf.push(lines[i++].replace(/^> ?/, ''));
      out.push('<blockquote>' + buf.map(inline).join('<br></br>') + '</blockquote>');
    } else if (/^[-*] /.test(l)){                          // ul
      const buf = [];
      while (i < lines.length && /^[-*] /.test(lines[i])) buf.push(lines[i++]);
      out.push('<ul>' + buf.map(x => '<li>' + inline(x.replace(/^[-*] /, '')) + '</li>').join('') + '</ul>');
    } else if (/^\d+\. /.test(l)){                         // ol
      const buf = [];
      while (i < lines.length && /^\d+\. /.test(lines[i])) buf.push(lines[i++]);
      out.push('<ol>' + buf.map(x => '<li>' + inline(x.replace(/^\d+\. /, '')) + '</li>').join('') + '</ol>');
    } else if (/^@\w+/.test(l)){                           // @check directives
      out.push('<span class="directive">' + esc(l) + '</span>'); i++;
    } else if (/^\s*$/.test(l)){
      i++;
    } else {                                               // paragraph
      const buf = [];
      while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,4} |```|\||> |[-*] |\d+\. |@\w)/.test(lines[i])) buf.push(lines[i++]);
      out.push('<p>' + buf.map(inline).join('<br></br>') + '</p>');
    }
  }
  return out.join('\n');
}

/* ================= tabs + routing ================= */
const TABS = [
  { id: 'overview',     label: 'Overview' },
  { id: 'tasks',        label: 'Tasks',        count: DATA.tasks.length },
  { id: 'requirements', label: 'Requirements', count: DATA.requirements.length },
  { id: 'graph',        label: 'Graph' },
  { id: 'activity',     label: 'Activity' },
  { id: 'files',        label: 'Files',        count: DATA.files.length },
];
function buildTabs(){
  $('#tabs').innerHTML = TABS.map(t =>
    '<button class="tab" data-t="' + t.id + '">' + t.label +
    (t.count != null ? '<span class="ct">' + t.count + '</span>' : '') + '</button>').join('');
  document.querySelectorAll('.tab').forEach(b => {
    b.addEventListener('click', () => { location.hash = b.dataset.t; });
  });
}
function route(){
  const h = (location.hash || '#overview').slice(1);
  const id = TABS.some(t => t.id === h) ? h : 'overview';
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.t === id));
  document.querySelectorAll('.view').forEach(s => s.classList.toggle('active', s.id === 'view-' + id));
  if (id === 'overview') animateHero();
}

/* ================= theme ================= */
const THEME_KEY = 'rivet-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  const b = $('#themeToggle');
  if (b){ b.textContent = t === 'dark' ? '☀️' : '🌙'; b.title = t === 'dark' ? 'Switch to light' : 'Switch to dark'; }
}
let theme = (function(){ try { return localStorage.getItem(THEME_KEY) || 'light'; } catch(e){ return 'light'; } })();
applyTheme(theme);
$('#themeToggle').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem(THEME_KEY, theme); } catch(e){}
  applyTheme(theme);
});

/* ================= init ================= */
function fmtStamp(iso){
  const d = new Date(iso);
  return d.toISOString().slice(0, 10) + ' ' + clock(iso) + ' UTC';
}
$('#stamp').innerHTML = 'generated <b>' + fmtStamp(DATA.generatedAt) + '</b> · <span style="color:var(--accent)">rivet dashboard</span>';
document.title = DATA.project + ' — dashboard';
buildTabs();
renderOverview();
renderTasks();
renderRequirements();
renderGraph();
renderActivity();
renderFiles();
window.addEventListener('hashchange', route);
route();
</script>
